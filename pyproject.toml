[tool.black]
line-length = 90

[tool.ruff]
select = ["ALL"]
unfixable = ["T201"]
ignore = [
    "E501",   # Line too long  # Will be fixed by black
    "A003",
    "RUF001",
    "ERA001",
    "F841",   # Local variable is assigned to but never used

    "ANN101",
    "ANN102",  # Missing type annotation for `cls` in classmethod
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed in `{name}`

    "D10",

    "D203",
    "D213",
    "EXE002",

    "PD011",
]
show-fixes = true
exclude = [
    "migrations",
    ".venv",
    "calculator-ts",
    "bot",
]

[tool.ruff.isort]
required-imports = ["from __future__ import annotations"]

[tool.ruff.per-file-ignores]
"__init__.py" = [
    "F401",  # Module imported but unused
]
"tests/**" = [
    "S101",  # Use of assert detected
    "PLR2004",  # Magic value used in comparison (tests may use literals)
    "COM812",   # Trailing comma missing (не критично для тестов)
    "I001",     # Import block is un-sorted or un-formatted
    "PT006",    # pytest.parametrize first arg should be tuple (разрешаем строку)
    "FBT001",   # Boolean-typed positional argument in function definition
    "RUF003",   # Ambiguous unicode in comments (русские комментарии в тестах)
    "PT023",   # Use @pytest.mark.django_db over @pytest.mark.django_db()
    "RUF002",  # Ambiguous unicode in docstrings (русские строки док)
    "UP035",   # typing.Dict deprecated -> допускаем в тестах
    "UP006",   # use dict instead of Dict -> допускаем в тестах
    "SIM105",  # contextlib.suppress vs try/except в тестах
    "S110",    # try/except/pass в тестах
    "BLE001",  # blind exception catching в тестах
    "SLF001",  # private member access в тестах
    "F401",    # imported but unused (в тестах допустимо)
    "ANN202",  # missing return type for private function
    "ANN001",  # missing type annotation for function argument
    "ARG001",  # unused function argument
]
"api/calculator/services.py" = [
    "I001",   # import order noise
    "TC002",  # third-party import into type-checking
    "UP007",  # Optional -> | None
    "RUF002",  # Ambiguous unicode in docstrings (русский текст)
    "RUF003",  # Ambiguous unicode in comments (русский текст)
    "C901",    # Function too complex (get_rates)
    "PLR0912", # Too many branches (estimate)
    "PLR0915", # Too many statements (estimate)
    "TRY301",  # abstract raise suggestion
    "TRY003",  # exception message style
    "EM101",   # string literal in exception
    "PLR5501", # else after return (ветвление в старой логике)
    "SIM108",  # prefer ternary (не критично)
    "RET505",  # unnecessary else after return
    "FBT001",  # boolean-typed positional arg in function definition
    "SLF001",  # private member access (process cache)
]
"api/calculator/views.py" = [
    "I001",   # import order noise
    "TC002",  # type-only import suggestion
    "ARG002", # unused *_args/**_kwargs in DRF view
    "UP037",  # quoted annotation
]
"api/calculator/serializers.py" = [
    "RUF003", # ambiguous unicode in comments (русский текст)
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports_per_module = true
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
strict = false
implicit_reexport = true
exclude = [
    "venv",
    "migrations",
]

[tool.pytest.ini_options]
minversion = "7.0"
DJANGO_SETTINGS_MODULE = "api.config.settings"
addopts = "--exitfirst -vv --cov --cov-report=html --cov-fail-under=80"
testpaths = [
    "tests",
]
